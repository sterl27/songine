name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-smoke.txt

      - name: Backend import smoke check
        run: python -c "import fastapi, uvicorn; print('backend import smoke ok')"

      - name: Backend syntax smoke check
        run: python -m py_compile backend/main.py backend/dependencies.py backend/routers/protected.py backend/app.py
